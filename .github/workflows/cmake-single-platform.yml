name: Build OpenGL Project

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake build-essential
          sudo apt-get install -y mesa-common-dev libglu1-mesa-dev freeglut3-dev

      - name: Configure project with CMake
        run: |
          mkdir build
          cd build
          cmake .. -DCMAKE_BUILD_TYPE=Release

      - name: Build project
        run: |
          cd build
          cmake --build .

      - name: Run tests (if applicable)
        run: |
          cd build
          # If your tests require an OpenGL context (i.e. they open a window),
          # run them using xvfb to simulate a display:
          xvfb-run --auto-servernum ./your_test_executable
